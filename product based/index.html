<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Indian Nature Product (INP)</title>
  <meta name="description" content="Login to access premium Kokan turmeric and nature spices by INP.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-logo gradient-text">INP</h1>
      <p class="login-subtitle">Indian Nature Product</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="hello@inp.com" required>
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn">Access Dashboard</button>
        <p id="login-error">Invalid credentials. Try again.</p>
      </form>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
